plugins {
    id 'com.android.library'
    id 'com.vanniktech.maven.publish'
}

group = 'io.github.jebai'
def artifactId = 'nice-spinner'
version = '1.4.6'

android {
    namespace 'org.angmarch.views'
    compileSdk 34

    defaultConfig {
        minSdk 14

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.interpolator:interpolator:1.0.0'

    androidTestImplementation 'androidx.test:core:1.5.0'
    androidTestImplementation 'androidx.test:runner:1.5.2'
    androidTestImplementation 'org.assertj:assertj-core:3.12.2'
}

mavenPublishing {
    signAllPublications()
    coordinates(group, artifactId, version)
    pom {
        name = "Version Plugin"
        description = "NiceSpinner is a re-implementation of the default Android's spinner, with a nice arrow animation and a different way to display its content."
        url = "https://github.com/jebai/nice-spinner"
        licenses {
            license {
                name = "MIT License"
                url = "https://opensource.org/licenses/MIT"
            }
        }
        developers {
            developer {
                id = "jebai"
                name = "MingChen"
                email = "jebai@qq.com"
            }
        }
        scm {
            connection = "git@github.com:jebai/nice-spinner.git"
            developerConnection = "git@github.com:jebai/nice-spinner.git"
            url = "https://github.com/jebai/nice-spinner"
        }
    }
}

